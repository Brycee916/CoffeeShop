<!DOCTYPE html>
<html xmls:th="http://www.thymeleaf.org"> lang="en">
<form th:action="@{/saveProduct}" th:object="${product}" method="post">
    <body>
        <div align="center">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" th:field="*{name}">
            <br>
            
            <label for="price">Price:</label>
            <input type="text" step="0.01" id="price" name="price" th:field="*{price}">
            <br>
            
            <button type="submit">Save new product</button>
        </div>
    </body>
</form>
